version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rag_postgres
    restart: always
    ports:
      - "15432:5432"
    environment:
      - POSTGRES_USER=rag_admin
      - POSTGRES_PASSWORD=rag_secure
      - POSTGRES_DB=rag_db
    volumes:
      - pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: rag_minio
    restart: always
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      - MINIO_ROOT_USER=minio_admin
      - MINIO_ROOT_PASSWORD=minio_secure
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: always
    ports:
      - "16379:6379"  # 【重点】：左边改成 6380，避开你本地 Dify 占用的 6379

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: rag_es
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: rag_kibana
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "15601:5601"  # Kibana 的可视化后台端口
    depends_on:
      - elasticsearch

  # 记得在最下面的 volumes 里把 es_data 加上
volumes:
  pg_data:
  minio_data:
  es_data: