<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">RAG Builder 系统架构</title><desc id="desc">Web 控制台、FastAPI、数据与任务组件以及模型 API 的分层架构</desc>
  <defs><linearGradient id="bg"><stop stop-color="#09111F"/><stop offset="1" stop-color="#15132A"/></linearGradient><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0l8 4-8 4z" fill="#38BDF8"/></marker></defs>
  <rect width="1200" height="650" rx="28" fill="url(#bg)"/><text x="55" y="58" fill="#E2E8F0" font-family="sans-serif" font-size="26" font-weight="700">RAG Builder 系统架构</text><text x="55" y="86" fill="#64748B" font-family="sans-serif" font-size="15">接口、存储、异步任务、检索与模型服务分层协作</text>
  <g font-family="sans-serif"><rect x="420" y="112" width="360" height="72" rx="18" fill="#172554" stroke="#3B82F6"/><text x="600" y="144" text-anchor="middle" fill="#DBEAFE" font-size="21" font-weight="700">Web 控制台</text><text x="600" y="166" text-anchor="middle" fill="#93C5FD" font-size="13">本地操作 · 调试 · 观测</text>
  <path d="M600 184v42" stroke="#38BDF8" stroke-width="3" marker-end="url(#a)"/><rect x="370" y="230" width="460" height="82" rx="18" fill="#10233D" stroke="#22D3EE"/><text x="600" y="265" text-anchor="middle" fill="#CFFAFE" font-size="22" font-weight="700">FastAPI API</text><text x="600" y="289" text-anchor="middle" fill="#67E8F9" font-size="14">HTTP 接口 · 同步业务编排 · 控制台托管</text>
  <path d="M600 312v42" stroke="#38BDF8" stroke-width="3" marker-end="url(#a)"/>
  <g font-size="17" text-anchor="middle"><rect x="45" y="360" width="200" height="112" rx="16" fill="#111827" stroke="#475569"/><text x="145" y="401" fill="#E2E8F0" font-weight="700">PostgreSQL</text><text x="145" y="430" fill="#94A3B8" font-size="13">元数据 · 任务状态</text><rect x="265" y="360" width="200" height="112" rx="16" fill="#111827" stroke="#475569"/><text x="365" y="401" fill="#E2E8F0" font-weight="700">MinIO</text><text x="365" y="430" fill="#94A3B8" font-size="13">原始文件</text><rect x="485" y="360" width="230" height="112" rx="16" fill="#111827" stroke="#7C3AED"/><text x="600" y="401" fill="#E2E8F0" font-weight="700">Redis + Celery</text><text x="600" y="430" fill="#A78BFA" font-size="13">异步解析任务</text><rect x="735" y="360" width="210" height="112" rx="16" fill="#111827" stroke="#475569"/><text x="840" y="401" fill="#E2E8F0" font-weight="700">Worker</text><text x="840" y="430" fill="#94A3B8" font-size="13">解析 · 切分 · 入库</text><rect x="965" y="360" width="190" height="112" rx="16" fill="#111827" stroke="#06B6D4"/><text x="1060" y="401" fill="#E2E8F0" font-weight="700">Elasticsearch</text><text x="1060" y="430" fill="#67E8F9" font-size="13">chunk · 向量</text></g>
  <path d="M600 472v46" stroke="#8B5CF6" stroke-width="3" marker-end="url(#a)"/><rect x="285" y="525" width="630" height="78" rx="20" fill="#1E1B4B" stroke="#8B5CF6"/><text x="600" y="558" text-anchor="middle" fill="#EDE9FE" font-size="21" font-weight="700">LLM API</text><text x="600" y="583" text-anchor="middle" fill="#C4B5FD" font-size="14">Embedding · Rerank · Chat Model</text></g>
</svg>
