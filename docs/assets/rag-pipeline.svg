<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">RAG Builder 文档入库流水线</title><desc id="desc">从上传文档到状态更新的异步入库流程</desc>
  <defs><linearGradient id="bg"><stop stop-color="#0A1220"/><stop offset="1" stop-color="#15132B"/></linearGradient><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0l8 4-8 4z" fill="#22D3EE"/></marker></defs>
  <rect width="1200" height="430" rx="28" fill="url(#bg)"/><text x="52" y="57" fill="#E2E8F0" font-family="sans-serif" font-size="26" font-weight="700">文档入库流水线</text><text x="52" y="85" fill="#64748B" font-family="sans-serif" font-size="15">同步上传快速返回，耗时处理交给 Celery Worker</text>
  <path d="M115 180H1085" stroke="#164E63" stroke-width="4"/><g fill="none" stroke="#22D3EE" stroke-width="3" marker-end="url(#a)"><path d="M235 180h35"/><path d="M385 180h35"/><path d="M535 180h35"/><path d="M685 180h35"/><path d="M835 180h35"/><path d="M985 180h35"/></g>
  <g font-family="sans-serif" text-anchor="middle"><g fill="#111827" stroke="#334155"><rect x="45" y="130" width="190" height="100" rx="17"/><rect x="270" y="130" width="115" height="100" rx="17"/><rect x="420" y="130" width="115" height="100" rx="17"/><rect x="570" y="130" width="115" height="100" rx="17"/><rect x="720" y="130" width="115" height="100" rx="17"/><rect x="870" y="130" width="115" height="100" rx="17"/><rect x="1020" y="130" width="135" height="100" rx="17"/></g>
  <g fill="#E2E8F0" font-size="16" font-weight="700"><text x="140" y="172">上传文档</text><text x="327" y="172">MinIO</text><text x="477" y="163">创建</text><text x="477" y="187">PENDING</text><text x="627" y="163">投递</text><text x="627" y="187">Celery</text><text x="777" y="163">解析 · 清洗</text><text x="777" y="187">切分</text><text x="927" y="172">Embedding</text><text x="1087" y="163">写入</text><text x="1087" y="187">Elasticsearch</text></g>
  <g fill="#64748B" font-size="12"><text x="140" y="207">PDF / TXT / MD / DOCX</text><text x="327" y="207">保存原文件</text><text x="477" y="207">任务小票</text><text x="627" y="207">异步任务</text><text x="777" y="207">Worker</text><text x="927" y="207">分批调用</text><text x="1087" y="207">chunk + 向量</text></g>
  <path d="M1087 230v55H600" fill="none" stroke="#8B5CF6" stroke-width="3" marker-end="url(#a)"/><rect x="425" y="285" width="350" height="78" rx="18" fill="#1E1B4B" stroke="#8B5CF6"/><text x="600" y="317" fill="#EDE9FE" font-size="18" font-weight="700">更新文档状态</text><text x="600" y="344" fill="#A78BFA" font-size="14">SUCCESS / FAILED</text></g>
</svg>
