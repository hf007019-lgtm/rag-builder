<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">RAG Builder 检索调试与离线评测</title><desc id="desc">固定问题集经过 Baseline 和 Rerank 检索后对比排名、引用覆盖与失败用例</desc>
  <defs><linearGradient id="bg"><stop stop-color="#09121F"/><stop offset="1" stop-color="#15132C"/></linearGradient><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0l8 4-8 4z" fill="#A78BFA"/></marker></defs>
  <rect width="1200" height="430" rx="28" fill="url(#bg)"/><text x="52" y="57" fill="#E2E8F0" font-family="sans-serif" font-size="26" font-weight="700">检索调试与离线评测</text><text x="52" y="85" fill="#64748B" font-family="sans-serif" font-size="15">用固定输入持续比较召回、排序、引用与失败边界</text>
  <g font-family="sans-serif"><rect x="55" y="145" width="170" height="110" rx="18" fill="#111827" stroke="#475569"/><text x="140" y="190" text-anchor="middle" fill="#E2E8F0" font-size="18" font-weight="700">固定问题集</text><text x="140" y="220" text-anchor="middle" fill="#94A3B8" font-size="13">可重复输入</text>
  <path d="M225 200h70" stroke="#A78BFA" stroke-width="3" marker-end="url(#a)"/><rect x="295" y="118" width="190" height="70" rx="16" fill="#10233D" stroke="#38BDF8"/><text x="390" y="160" text-anchor="middle" fill="#BAE6FD" font-size="17" font-weight="700">Baseline 检索</text><rect x="295" y="215" width="190" height="70" rx="16" fill="#1E1B4B" stroke="#8B5CF6"/><text x="390" y="257" text-anchor="middle" fill="#DDD6FE" font-size="17" font-weight="700">Rerank 检索</text>
  <path d="M485 153h65v47h55M485 250h65v-50h55" fill="none" stroke="#A78BFA" stroke-width="3" marker-end="url(#a)"/><rect x="605" y="145" width="160" height="110" rx="18" fill="#111827" stroke="#475569"/><text x="685" y="190" text-anchor="middle" fill="#E2E8F0" font-size="18" font-weight="700">Top K 对比</text><text x="685" y="220" text-anchor="middle" fill="#94A3B8" font-size="13">召回与排序差异</text>
  <path d="M765 200h55" stroke="#A78BFA" stroke-width="3" marker-end="url(#a)"/><rect x="820" y="145" width="150" height="110" rx="18" fill="#111827" stroke="#06B6D4"/><text x="895" y="190" text-anchor="middle" fill="#CFFAFE" font-size="18" font-weight="700">引用覆盖</text><text x="895" y="220" text-anchor="middle" fill="#67E8F9" font-size="13">证据是否命中</text>
  <path d="M970 200h50" stroke="#A78BFA" stroke-width="3" marker-end="url(#a)"/><rect x="1020" y="145" width="135" height="110" rx="18" fill="#111827" stroke="#F59E0B"/><text x="1087" y="184" text-anchor="middle" fill="#FDE68A" font-size="17" font-weight="700">失败用例</text><text x="1087" y="208" text-anchor="middle" fill="#FDE68A" font-size="17" font-weight="700">记录</text><text x="1087" y="234" text-anchor="middle" fill="#A1A1AA" font-size="12">持续迭代</text>
  <rect x="300" y="335" width="600" height="42" rx="12" fill="#0F172A" stroke="#334155"/><text x="600" y="362" text-anchor="middle" fill="#94A3B8" font-size="14">同一问题集 · 同一知识库 · 可比较参数 · 可追踪结果</text></g>
</svg>
