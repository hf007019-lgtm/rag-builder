<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-labelledby="title desc">
  <title id="title">RAG Builder 系统状态面板</title><desc id="desc">FastAPI、PostgreSQL、Redis、MinIO、Elasticsearch、Celery Worker 和 LLM API 的示意健康状态</desc>
  <defs><linearGradient id="bg"><stop stop-color="#09121F"/><stop offset="1" stop-color="#15132C"/></linearGradient></defs>
  <rect width="1200" height="470" rx="28" fill="url(#bg)"/><text x="52" y="57" fill="#E2E8F0" font-family="sans-serif" font-size="26" font-weight="700">系统状态面板</text><text x="52" y="85" fill="#64748B" font-family="sans-serif" font-size="15">依赖健康检查示意 · 不包含真实环境或业务数据</text><rect x="985" y="38" width="165" height="42" rx="21" fill="#0F2E29" stroke="#10B981"/><circle cx="1012" cy="59" r="7" fill="#34D399"/><text x="1030" y="65" fill="#A7F3D0" font-family="sans-serif" font-size="14">状态可观测</text>
  <g font-family="sans-serif"><g fill="#111827" stroke="#334155"><rect x="55" y="125" width="255" height="100" rx="18"/><rect x="330" y="125" width="255" height="100" rx="18"/><rect x="605" y="125" width="255" height="100" rx="18"/><rect x="880" y="125" width="265" height="100" rx="18"/><rect x="190" y="255" width="255" height="100" rx="18"/><rect x="465" y="255" width="255" height="100" rx="18"/><rect x="740" y="255" width="265" height="100" rx="18"/></g>
  <g fill="#E2E8F0" font-size="18" font-weight="700"><text x="95" y="172">FastAPI</text><text x="370" y="172">PostgreSQL</text><text x="645" y="172">Redis</text><text x="920" y="172">MinIO</text><text x="230" y="302">Elasticsearch</text><text x="505" y="302">Celery Worker</text><text x="780" y="302">LLM API</text></g>
  <g font-size="13"><circle cx="280" cy="174" r="9" fill="#34D399"/><text x="95" y="201" fill="#94A3B8">接口服务</text><circle cx="555" cy="174" r="9" fill="#34D399"/><text x="370" y="201" fill="#94A3B8">元数据连接</text><circle cx="830" cy="174" r="9" fill="#34D399"/><text x="645" y="201" fill="#94A3B8">消息队列</text><circle cx="1115" cy="174" r="9" fill="#34D399"/><text x="920" y="201" fill="#94A3B8">对象存储</text><circle cx="415" cy="304" r="9" fill="#34D399"/><text x="230" y="331" fill="#94A3B8">检索与向量索引</text><circle cx="690" cy="304" r="9" fill="#FBBF24"/><text x="505" y="331" fill="#94A3B8">异步活性</text><circle cx="975" cy="304" r="9" fill="#60A5FA"/><text x="780" y="331" fill="#94A3B8">模型配置</text></g>
  <rect x="305" y="395" width="590" height="38" rx="12" fill="#0F172A" stroke="#334155"/><text x="600" y="420" text-anchor="middle" fill="#94A3B8" font-size="13">绿色：健康　黄色：需关注　蓝色：配置状态</text></g>
</svg>
